---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: meshnet-clusterrole
rules:
  # Read-only access to Node objects so the daemon can verify peer IPs
  # received via gwirekobj / topology CRs before dialing them.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups:
    - "networkop.co.uk"
    resources:
    - topologies
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups:
    - "networkop.co.uk"
    resources:
    - gwirekobjs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups:
    - "networkop.co.uk"
    resources:
    - topologies/status
    - gwirekobjs/spec
    - gwirekobjs/status
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: meshnet-clusterrolebinding
roleRef:
  kind: ClusterRole
  name: meshnet-clusterrole
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: meshnet
  namespace: meshnet
