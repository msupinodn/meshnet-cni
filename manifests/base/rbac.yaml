---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: meshnet-clusterrole
rules:
  # Read access to Node objects so the daemon can verify peer IPs received via
  # gwirekobj / topology CRs before dialing them, plus patch/update so the
  # daemon can clear its own node's readiness taint once the CNI conflist is
  # installed (see RemoveReadinessTaint in daemon/meshnet/taint.go).
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups:
    - "networkop.co.uk"
    resources:
    - topologies
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups:
    - "networkop.co.uk"
    resources:
    - gwirekobjs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups:
    - "networkop.co.uk"
    resources:
    - topologies/status
    - gwirekobjs/spec
    - gwirekobjs/status
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: meshnet-clusterrolebinding
roleRef:
  kind: ClusterRole
  name: meshnet-clusterrole
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: meshnet
  namespace: meshnet
